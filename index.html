<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#08080f">
  <meta name="description" content="A browser-based tower defense game with a cyberpunk neon aesthetic, 6-element combat wheel, branching tower upgrades, procedural levels, and a roguelite unlock tree.">

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Tower Defense">
  <meta property="og:description" content="Cyberpunk neon tower defense — 6 elements, 14 towers, procedural campaign, endless mode, challenges, roguelite unlocks.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="favicon.svg">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Tower Defense">
  <meta name="twitter:description" content="Cyberpunk neon tower defense — 6 elements, 14 towers, procedural campaign, endless mode, challenges, roguelite unlocks.">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <title>Tower Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      /* Use dynamic viewport height so mobile browser UI (address bar)
         doesn't clip the bottom of the canvas. Fall back to 100% for
         older engines that don't support dvh. */
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #08080f;
      color: #e0e0e0;
      font-family: "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: none;
      overscroll-behavior: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Canvas Phaser injects — keep it centered and responsive. */
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <noscript>
    <p style="color:#e0e0e0; text-align:center; padding:2rem;">
      This game requires JavaScript to run.
    </p>
  </noscript>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
